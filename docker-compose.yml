services:

  frontend:

    build: .

    container_name: tareas_frontend

    ports:
      - "8080:80"

    depends_on:
      - database

  database:

    image: mysql:8.0

    container_name: tareas_database

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestion_tareas

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: